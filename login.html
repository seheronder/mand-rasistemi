<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap - Mandıra Yönetim</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { background-color: #e3f2fd; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
    .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    .btn-primary { height: 50px; font-weight: bold; font-size: 1.1rem; width: 100%; }
    .link-text { cursor: pointer; color: #0d6efd; font-weight: 600; text-decoration: none; }
    .link-text:hover { text-decoration: underline; }
    .form-section { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    /* MOBİL UYUMLULUK  */
    @media (max-width: 768px) {
      .sidebar {
        left: -260px;
        transition: 0.3s;
      }
      .sidebar.aktif {
        left: 0;
        box-shadow: 5px 0 15px rgba(0,0,0,0.3);
      }
      .main-content {
        margin-left: 0;
        width: 100%;
      }

      #mobilMenuBtn {
        display: inline-block !important;
      }
    }

    /* Masaüstünde butonu gizle */
    #mobilMenuBtn { display: none; }
  </style>
</head>
<body>

<div class="login-card">
  <h3 class="text-center mb-4" style="color: #2c3e50;">
    <i class="fas fa-cow text-primary"></i> Mandıra Yönetim
  </h3>

  <div id="login-box" class="form-section">
    <form onsubmit="girisYap(event)">
      <div class="mb-3">
        <label class="form-label">Kullanıcı Adı veya E-Posta</label>
        <input type="text" id="girisKullanici" class="form-control form-control-lg" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Şifre</label>
        <input type="password" id="girisSifre" class="form-control form-control-lg" required>
      </div>
      <div class="d-flex justify-content-between mb-4">
        <div></div>
        <span class="link-text small" onclick="sifreModalAc()">Şifreni mi unuttun?</span>
      </div>
      <button type="submit" class="btn btn-primary">GİRİŞ YAP</button>
    </form>
    <div class="text-center mt-4">
      Hesabın yok mu? <span class="link-text" onclick="formDegistir('register')">Hemen Kaydol</span>
    </div>
  </div>

  <div id="register-box" class="form-section" style="display: none;">
    <h5 class="text-center mb-3">Yeni Yönetici Kaydı</h5>
    <form onsubmit="kayitOl(event)">
      <div class="mb-3">
        <input type="text" id="regUser" class="form-control" placeholder="Kullanıcı Adı Belirle" required>
      </div>
      <div class="mb-3">
        <input type="email" id="regEmail" class="form-control" placeholder="E-Posta Adresi" required>
      </div>
      <div class="mb-3">
        <input type="tel" id="regPhone" class="form-control" placeholder="Telefon Numaranız (5xx...)" required>
      </div>
      <div class="mb-3">
        <input type="password" id="regPass" class="form-control" placeholder="Şifre Belirle" required>
      </div>
      <button type="submit" class="btn btn-success w-100 btn-primary" style="background-color: #198754;">KAYDI TAMAMLA</button>
    </form>
    <div class="text-center mt-4">
      Zaten hesabın var mı? <span class="link-text" onclick="formDegistir('login')">Giriş Yap</span>
    </div>
  </div>

  <div id="mesajKutusu" class="alert mt-3 text-center" style="display: none;"></div>
</div>

<div class="modal fade" id="forgotModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Şifre Sıfırlama</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="step1">
          <p>Kayıtlı e-posta adresinizi girin, doğrulama kodu gönderelim.</p>
          <input type="email" id="forgotEmail" class="form-control mb-3" placeholder="ornek@mail.com">
          <button class="btn btn-primary w-100" onclick="kodGonder()">Kod Gönder</button>
        </div>
        <div id="step2" style="display: none;">
          <div class="alert alert-success small">Kod e-postanıza gönderildi!</div>
          <input type="text" id="resetKod" class="form-control mb-2" placeholder="Gelen 6 Haneli Kod">
          <input type="password" id="newPass" class="form-control mb-3" placeholder="Yeni Şifre Belirle">
          <button class="btn btn-success w-100" onclick="sifreyiDegistir()">Şifreyi Güncelle</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "http://127.0.0.1:3000";

    //GÖRÜNÜM FONKSİYONLARI
    function formDegistir(hedef) {
        document.getElementById('mesajKutusu').style.display = 'none';
        document.getElementById('login-box').style.display = hedef === 'login' ? 'block' : 'none';
        document.getElementById('register-box').style.display = hedef === 'register' ? 'block' : 'none';
    }

    function mesajGoster(tip, metin) {
        const k = document.getElementById('mesajKutusu');
        k.className = `alert mt-3 text-center alert-${tip === 'hata' ? 'danger' : 'success'}`;
        k.innerText = metin;
        k.style.display = 'block';
    }

    function sifreModalAc() {
        new bootstrap.Modal(document.getElementById('forgotModal')).show();
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
    }

    //GİRİŞ YAP
    async function girisYap(e) {
      e.preventDefault();

      const kadi = document.getElementById('girisKullanici').value;
      const sifre = document.getElementById('girisSifre').value;

      try {
        const response = await fetch(API + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: kadi, password: sifre })
        });

        const sonuc = await response.json();

        if (sonuc.basarili) {

          localStorage.setItem('userId', sonuc.id);
          localStorage.setItem('userRole', sonuc.role); // ROLÜ KAYDETMEK ÖNEMLİ!

          if (sonuc.shop_code) {
            localStorage.setItem('shopCode', sonuc.shop_code);
          } else {
            localStorage.setItem('shopCode', 'KOD-YOK');
          }

          mesajGoster('basari', "Giriş Başarılı! Yönlendiriliyorsunuz...");

          setTimeout(() => {
            if (sonuc.role === 'courier') {
              window.location.href = 'kurye.html';
            } else {
              window.location.href = 'index.html';
            }
          }, 1000);

        } else {
          mesajGoster('hata', sonuc.mesaj);
        }

      } catch (err) {
        console.error(err);
        mesajGoster('hata', "Sunucuya bağlanılamadı!");
      }
    }

    //KAYIT OL
    async function kayitOl(e) {
        e.preventDefault();
        const u = document.getElementById('regUser').value;
        const em = document.getElementById('regEmail').value;
        const p = document.getElementById('regPass').value;

        try {
            const res = await fetch(API + '/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, email: em, password: p, phone: phone })
            });
            const json = await res.json();

            if (json.basarili) {
                alert(`✅ Kayıt Başarılı!\n\n🔑 DÜKKAN KODUNUZ: ${json.kod}\n\nBu kodu saklayın, giriş yapınca sol menüde de göreceksiniz.`);
                formDegistir('login');
            } else {
                mesajGoster('hata', json.mesaj);
            }
        } catch (err) { mesajGoster('hata', "Kayıt sırasında hata oluştu."); }
    }

    //ŞİFRE İŞLEMLERİ
    async function kodGonder() {
        const email = document.getElementById('forgotEmail').value;
        if(!email) return alert("E-posta girin!");

        try {
            const res = await fetch(API + '/forgot-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email })
            });
            const json = await res.json();

            if (json.basarili) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
            } else { alert(json.mesaj); }
        } catch (e) { alert("Sunucu hatası."); }
    }

    async function sifreyiDegistir() {
        const email = document.getElementById('forgotEmail').value;
        const code = document.getElementById('resetKod').value;
        const newPass = document.getElementById('newPass').value;

        try {
            const res = await fetch(API + '/reset-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, code, newPassword: newPass })
            });
            const json = await res.json();

            if (json.basarili) {
                alert("Şifre başarıyla değiştirildi! Giriş yapabilirsiniz.");
                window.location.reload();
            } else { alert(json.mesaj); }
        } catch (e) { alert("Hata oluştu."); }
    }
</script>
</body>
</html>
